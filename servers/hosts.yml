---
# Inventory: just hosts and how to reach them.
# Per-host config lives in <hostname>/vars.yml + vault.yml at the repo root,
# and is loaded explicitly by each playbook via include_vars.
all:
  hosts:
    truenas:
      ansible_host: truenas.bajaber.ca
      ansible_connection: local
    docker-vm:
      ansible_host: 192.168.1.183
      ansible_user: root
