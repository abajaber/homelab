---
# qbittorrent routed through gluetun (ProtonVPN/WireGuard).
# Secrets resolved from sibling .env (vault-encrypted).
networks:
  proxy:
    external: true
    name: proxy
  media-internal:
    external: true
    name: media-internal

services:
  gluetun:
    image: qmcgaw/gluetun:v3.41.1
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - PUID=568
      - PGID=568
      - TZ=America/Toronto
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - VPN_PORT_FORWARDING=on
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - SERVER_CITIES=Montreal,Toronto,New York,Boston
      - PORT_FORWARD_ONLY=on
      - DOT=off
      - VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c '/usr/bin/wget -O- --retry-connrefused --post-data "json={\"listen_port\":{{PORTS}}}" http://127.0.0.1:8080/api/v2/app/setPreferences 2>&1'
      - FIREWALL_OUTBOUND_SUBNETS=192.168.1.0/24
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 60s
      timeout: 20s
      retries: 5
    volumes:
      - /mnt/redsea/apps/qbittorrent-vpn/gluetun/config:/gluetun
    networks:
      - proxy
      - media-internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.qbit-vpn.rule=Host(`qbit-vpn.bajaber.ca`)
      - traefik.http.routers.qbit-vpn.entrypoints=websecure
      - traefik.http.routers.qbit-vpn.tls=true
      - traefik.http.routers.qbit-vpn.tls.certresolver=cloudflare
      - traefik.http.services.qbit-vpn.loadbalancer.server.port=8080
      - traefik.http.routers.qbit-vpn.middlewares=authentik@docker
      - traefik.http.routers.qbit-vpn.priority=10
      - traefik.http.routers.qbit-vpn-api.rule=Host(`qbit-vpn.bajaber.ca`) && PathPrefix(`/api/v2`)
      - traefik.http.routers.qbit-vpn-api.entrypoints=websecure
      - traefik.http.routers.qbit-vpn-api.tls=true
      - traefik.http.routers.qbit-vpn-api.tls.certresolver=cloudflare
      - traefik.http.routers.qbit-vpn-api.service=qbit-vpn
      - traefik.http.routers.qbit-vpn-api.priority=20
      - deunhealth.restart.on.unhealthy=true

  qbittorrent:
    image: linuxserver/qbittorrent:5.1.4-r3-ls451
    container_name: qbittorrent-vpn
    restart: unless-stopped
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_started
        restart: true
    environment:
      - PUID=568
      - PGID=568
      - TZ=America/Toronto
      - WEBUI_PORT=8080
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - /mnt/redsea/apps/qbittorrent-vpn/qbittorrent/config:/config
      - /mnt/redsea/arr/torrents:/data/torrents
    labels:
      - deunhealth.restart.on.unhealthy=true

  deunhealth:
    image: qmcgaw/deunhealth:v0.3.0
    container_name: deunhealth
    restart: always
    network_mode: none
    environment:
      - LOG_LEVEL=info
      - HEALTH_SERVER_ADDRESS=127.0.0.1:9999
      - TZ=America/Toronto
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
