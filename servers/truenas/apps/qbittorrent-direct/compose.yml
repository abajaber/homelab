---
# qbittorrent without VPN — direct routing through the LAN/WAN.
# Shares /data/torrents/ with qbittorrent-vpn; categories can match (`tv`,
# `movies`, ...). *arr apps route between the two clients via tags
# (Prowlarr indexer tag → Sonarr/Radarr download-client tag), not category
# names. Each qbit has its own /config DB so state never collides.
networks:
  proxy:
    external: true
    name: proxy
  media-internal:
    external: true
    name: media-internal

services:
  qbittorrent:
    image: linuxserver/qbittorrent:5.1.4-r3-ls451
    container_name: qbittorrent-direct
    restart: unless-stopped
    environment:
      - PUID=568
      - PGID=568
      - TZ=America/Toronto
      - WEBUI_PORT=8080
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - /mnt/redsea/apps/qbittorrent-direct/config:/config
      - /mnt/redsea/arr/torrents:/data/torrents
    ports:
      - 26614:26614
      - 26614:26614/udp
    networks:
      - proxy
      - media-internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.qbit-direct.rule=Host(`qbit-direct.bajaber.ca`)
      - traefik.http.routers.qbit-direct.entrypoints=websecure
      - traefik.http.routers.qbit-direct.tls=true
      - traefik.http.routers.qbit-direct.tls.certresolver=cloudflare
      - traefik.http.services.qbit-direct.loadbalancer.server.port=8080
      - traefik.http.routers.qbit-direct.middlewares=authentik@docker
      - traefik.http.routers.qbit-direct.priority=10
      - traefik.http.routers.qbit-direct-api.rule=Host(`qbit-direct.bajaber.ca`) && PathPrefix(`/api/v2`)
      - traefik.http.routers.qbit-direct-api.entrypoints=websecure
      - traefik.http.routers.qbit-direct-api.tls=true
      - traefik.http.routers.qbit-direct-api.tls.certresolver=cloudflare
      - traefik.http.routers.qbit-direct-api.service=qbit-direct
      - traefik.http.routers.qbit-direct-api.priority=20
