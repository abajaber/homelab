---
networks:
  proxy:
    external: true
    name: proxy
  media-internal:
    external: true
    name: media-internal

services:
  lidarr:
    image: linuxserver/lidarr:3.1.0
    container_name: lidarr
    restart: unless-stopped
    environment:
      - PUID=568
      - PGID=568
      - TZ=America/toronto
    volumes:
      - /mnt/redsea/apps/music-tools/lidarr/config:/config
      - /mnt/redsea/arr:/data
    networks:
      - proxy
      - media-internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.lidarr.rule=Host(`lidarr.bajaber.ca`)
      - traefik.http.routers.lidarr.entrypoints=websecure
      - traefik.http.routers.lidarr.tls=true
      - traefik.http.routers.lidarr.tls.certresolver=cloudflare
      - traefik.http.services.lidarr.loadbalancer.server.port=8686
      - traefik.http.routers.lidarr.middlewares=authentik@docker
      - traefik.http.routers.lidarr.priority=10
      - traefik.http.routers.lidarr-api.rule=Host(`lidarr.bajaber.ca`) && PathPrefix(`/api`)
      - traefik.http.routers.lidarr-api.entrypoints=websecure
      - traefik.http.routers.lidarr-api.tls=true
      - traefik.http.routers.lidarr-api.tls.certresolver=cloudflare
      - traefik.http.routers.lidarr-api.service=lidarr
      - traefik.http.routers.lidarr-api.priority=20

  # Soulseek daemon. SLSKD_REMOTE_CONFIGURATION=true lets the web UI write
  # back to /app/slskd.yml — the API key (used by Soularr+Explo) is generated
  # post-deploy in the slskd UI under Settings -> Authentication, then pasted
  # into music-tools/.env as SLSKD_API_KEY. Soulseek peer port 50300 must be
  # forwarded on the home router for upload reciprocation; without it,
  # firewalled peers queue you indefinitely.
  slskd:
    image: slskd/slskd:0.22.5
    container_name: slskd
    restart: unless-stopped
    user: "568:568"
    environment:
      - TZ=America/toronto
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_SLSK_USERNAME=${SLSKD_SLSK_USERNAME}
      - SLSKD_SLSK_PASSWORD=${SLSKD_SLSK_PASSWORD}
      - SLSKD_SLSK_LISTEN_PORT=50300
    ports:
      - 50300:50300/tcp
    volumes:
      - /mnt/redsea/apps/music-tools/slskd/app:/app
      - /mnt/redsea/arr/torrents/music:/downloads
      - /mnt/redsea/arr/torrents/music/incomplete:/incomplete
    networks:
      - proxy
      - media-internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.slskd.rule=Host(`slskd.bajaber.ca`)
      - traefik.http.routers.slskd.entrypoints=websecure
      - traefik.http.routers.slskd.tls=true
      - traefik.http.routers.slskd.tls.certresolver=cloudflare
      - traefik.http.services.slskd.loadbalancer.server.port=5030
      - traefik.http.routers.slskd.middlewares=authentik@docker
      - traefik.http.routers.slskd.priority=10
      - traefik.http.routers.slskd-api.rule=Host(`slskd.bajaber.ca`) && PathPrefix(`/api`)
      - traefik.http.routers.slskd-api.entrypoints=websecure
      - traefik.http.routers.slskd-api.tls=true
      - traefik.http.routers.slskd-api.tls.certresolver=cloudflare
      - traefik.http.routers.slskd-api.service=slskd
      - traefik.http.routers.slskd-api.priority=20

  # Bridges Lidarr's "wanted" list to slskd. Reads /data/config.ini (seed
  # post-deploy with Lidarr+slskd API keys and host URLs); env vars only
  # control runtime, not credentials. WEBUI_ENABLED exposes a log/config
  # viewer on 8265, gated by Authentik (no API to bypass).
  soularr:
    image: mrusse08/soularr:v1.2.1
    container_name: soularr
    restart: unless-stopped
    user: "568:568"
    environment:
      - TZ=America/toronto
      - SCRIPT_INTERVAL=300
      - WEBUI_ENABLED=true
    volumes:
      - /mnt/redsea/apps/music-tools/soularr/data:/data
      - /mnt/redsea/arr/torrents/music:/downloads
    networks:
      - proxy
      - media-internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.soularr.rule=Host(`soularr.bajaber.ca`)
      - traefik.http.routers.soularr.entrypoints=websecure
      - traefik.http.routers.soularr.tls=true
      - traefik.http.routers.soularr.tls.certresolver=cloudflare
      - traefik.http.services.soularr.loadbalancer.server.port=8265
      - traefik.http.routers.soularr.middlewares=authentik@docker
      - traefik.http.routers.soularr.priority=10

  # Headless ListenBrainz -> Navidrome recommender. No UI, no Traefik. Logs
  # into Navidrome's Subsonic API as the dedicated `explo` user
  # (EXPLO_NAVIDROME_USERNAME/PASSWORD = Navidrome Subsonic password, NOT
  # Authentik). Drops downloaded tracks into media/music/explo so Navidrome's
  # next scan picks them up and creates a playlist.
  explo:
    image: ghcr.io/lumepart/explo:v0.11.5
    container_name: explo
    restart: unless-stopped
    user: "568:568"
    environment:
      - TZ=America/toronto
      - EXECUTE_ON_START=false
      - LISTENBRAINZ_USER=${LISTENBRAINZ_USER}
      - DISCOVERY_SERVICE=listenbrainz
      - LISTENBRAINZ_DISCOVERY=playlist
      - EXPLO_SYSTEM=subsonic
      - SYSTEM_URL=http://navidrome:4533
      - SYSTEM_USERNAME=${EXPLO_NAVIDROME_USERNAME}
      - SYSTEM_PASSWORD=${EXPLO_NAVIDROME_PASSWORD}
      - DOWNLOAD_SERVICES=slskd
      - SLSKD_URL=http://slskd:5030
      - SLSKD_API_KEY=${SLSKD_API_KEY}
      - MIGRATE_DOWNLOADS=true
      - EXTENSIONS=flac,mp3
      - WEEKLY_EXPLORATION_SCHEDULE=15 00 * * 2
      - WEEKLY_JAMS_SCHEDULE=15 00 * * 1
      - DAILY_JAMS_SCHEDULE=15 00 * * *
    volumes:
      - /mnt/redsea/arr/media/music/explo:/data
      - /mnt/redsea/arr/torrents/music:/slskd
    networks:
      - media-internal
