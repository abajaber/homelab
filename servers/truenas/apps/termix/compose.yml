---
networks:
  proxy:
    external: true
    name: proxy
  termix-internal:
    driver: bridge

services:
  termix:
    image: ghcr.io/lukegus/termix:release-2.1.0
    container_name: termix
    restart: unless-stopped
    environment:
      PORT: "8080"
      TZ: America/Toronto
    volumes:
      - /mnt/redsea/apps/termix/data:/app/data
    depends_on:
      - guacd
    networks:
      - proxy
      - termix-internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.termix.rule=Host(`termix.bajaber.ca`)
      - traefik.http.routers.termix.entrypoints=websecure
      - traefik.http.routers.termix.tls=true
      - traefik.http.routers.termix.tls.certresolver=cloudflare
      - traefik.http.services.termix.loadbalancer.server.port=8080

  guacd:
    image: guacamole/guacd:1.6.0
    container_name: termix-guacd
    restart: unless-stopped
    networks:
      - termix-internal
