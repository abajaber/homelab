  Joined networks - ix-internal-immich-net #### Running user/group(s) - User: 999
  - Group: 999 - Supplementary Groups: apps --- ### Container: [redis] #### Joined
  networks - ix-internal-immich-net #### Running user/group(s) - User: 568 - Group:
