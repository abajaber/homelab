      - traefik.http.routers.radarr.tls.certresolver=cloudflare
      - traefik.http.services.radarr.loadbalancer.server.port=7878
      - traefik.http.routers.radarr.middlewares=authentik@docker
      - traefik.http.routers.radarr.priority=10
      - traefik.http.routers.radarr-api.rule=Host(`radarr.bajaber.ca`) && PathPrefix(`/api`)
      - traefik.http.routers.radarr-api.entrypoints=websecure
      - traefik.http.routers.radarr-api.tls=true
      - traefik.http.routers.radarr-api.tls.certresolver=cloudflare
      - traefik.http.routers.radarr-api.service=radarr
      - traefik.http.routers.radarr-api.priority=20

  bazarr:
