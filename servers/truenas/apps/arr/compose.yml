      - traefik.http.routers.bazarr.rule=Host(`bazarr.bajaber.ca`)
      - traefik.http.routers.bazarr.entrypoints=websecure
      - traefik.http.routers.bazarr.tls=true
      - traefik.http.routers.bazarr.tls.certresolver=cloudflare
      - traefik.http.services.bazarr.loadbalancer.server.port=6767
      - traefik.http.routers.bazarr.middlewares=authentik@docker
      - traefik.http.routers.bazarr.priority=10
      - traefik.http.routers.bazarr-api.rule=Host(`bazarr.bajaber.ca`) && PathPrefix(`/api`)
      - traefik.http.routers.bazarr-api.entrypoints=websecure
      - traefik.http.routers.bazarr-api.tls=true
      - traefik.http.routers.bazarr-api.tls.certresolver=cloudflare
      - traefik.http.routers.bazarr-api.service=bazarr
