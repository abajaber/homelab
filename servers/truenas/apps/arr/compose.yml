---
networks:
  proxy:
    external: true
    name: proxy
  media-internal:
    external: true
    name: media-internal

services:
  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=568
      - PGID=568
      - TZ=America/toronto
    volumes:
      - /mnt/redsea/apps/arr/sonarr/config:/config
      - /mnt/redsea/arr:/data
    networks:
      - proxy
      - media-internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.sonarr.rule=Host(`sonarr.bajaber.ca`)
      - traefik.http.routers.sonarr.entrypoints=websecure
      - traefik.http.routers.sonarr.tls=true
      - traefik.http.routers.sonarr.tls.certresolver=cloudflare
      - traefik.http.services.sonarr.loadbalancer.server.port=8989
      - traefik.http.routers.sonarr.middlewares=authentik@docker
      - traefik.http.routers.sonarr.priority=10
      - traefik.http.routers.sonarr-api.rule=Host(`sonarr.bajaber.ca`) && PathPrefix(`/api`)
      - traefik.http.routers.sonarr-api.entrypoints=websecure
      - traefik.http.routers.sonarr-api.tls=true
      - traefik.http.routers.sonarr-api.tls.certresolver=cloudflare
      - traefik.http.routers.sonarr-api.service=sonarr
      - traefik.http.routers.sonarr-api.priority=20

  # Second Sonarr instance, dedicated to standard TV (the `sonarr` service
  # above is anime-only). Shares /data with the rest of the stack so both
  # Sonarrs see the full TRaSH layout but each points at its own subfolder
  # (/data/media/tv vs /data/media/anime). Internal hostname for Prowlarr
  # and Jellyseerr is `sonarr-tv:8989` on media-internal.
  sonarr-tv:
    image: linuxserver/sonarr:latest
    container_name: sonarr-tv
    restart: unless-stopped
    environment:
      - PUID=568
      - PGID=568
      - TZ=America/toronto
    volumes:
      - /mnt/redsea/apps/arr/sonarr-tv/config:/config
      - /mnt/redsea/arr:/data
    networks:
      - proxy
      - media-internal
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.sonarr-tv.rule=Host(`sonarr-tv.bajaber.ca`)
      - traefik.http.routers.sonarr-tv.entrypoints=websecure
      - traefik.http.routers.sonarr-tv.tls=true
      - traefik.http.routers.sonarr-tv.tls.certresolver=cloudflare
      - traefik.http.services.sonarr-tv.loadbalancer.server.port=8989
      - traefik.http.routers.sonarr-tv.middlewares=authentik@docker
      - traefik.http.routers.sonarr-tv.priority=10
      - traefik.http.routers.sonarr-tv-api.rule=Host(`sonarr-tv.bajaber.ca`) && PathPrefix(`/api`)
      - traefik.http.routers.sonarr-tv-api.entrypoints=websecure
      - traefik.http.routers.sonarr-tv-api.tls=true
      - traefik.http.routers.sonarr-tv-api.tls.certresolver=cloudflare
      - traefik.http.routers.sonarr-tv-api.service=sonarr-tv
      - traefik.http.routers.sonarr-tv-api.priority=20

  radarr:
