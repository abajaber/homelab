name: arr
networks:
  default:
    external: true
    name: proxy
services:
  bazarr:
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/toronto
    image: linuxserver/bazarr:latest
    labels:
      - traefik.enable=true
    networks:
      default: null
    restart: unless-stopped
    volumes:
      - bind:
          create_host_path: true
        read_only: true
        source: /etc/localtime
        target: /etc/localtime
        type: bind
      - bind:
          create_host_path: true
        source: /docker/bazarr
        target: /config
        type: bind
      - bind:
          create_host_path: true
        source: /data
        target: /data
        type: bind
  deunhealth:
    container_name: deunhealth
    environment:
      - LOG_LEVEL=info
      - HEALTH_SERVER_ADDRESS=127.0.0.1:9999
      - TZ=America/toronto
    image: qmcgaw/deunhealth
    network_mode: none
    restart: always
    volumes:
      - bind:
          create_host_path: true
        source: /var/run/docker.sock
        target: /var/run/docker.sock
        type: bind
  gluetun:
    cap_add:
      - NET_ADMIN
    container_name: gluetun
    devices:
      - permissions: rwm
        source: /dev/net/tun
        target: /dev/net/tun
    environment:
      - TZ=America/toronto
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - VPN_PORT_FORWARDING=on
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - SERVER_CITIES=Montreal, Toronto, New York,Boston
      - PORT_FORWARD_ONLY=on
      - VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c '/usr/bin/wget -O-
        --retry-connrefused --post-data "json={\"listen_port\":{{PORTS}}}"
        http://127.0.0.1:8080/api/v2/app/setPreferences 2>&1'
      - FIREWALL_OUTBOUND_SUBNETS=192.168.1.0/24
    healthcheck:
      interval: 60s
      retries: 5
      test: ping -c 1 www.google.com || exit 1
      timeout: 20s
    image: qmcgaw/gluetun
    labels:
      - deunhealth.restart.on.unhealthy="true"
      - traefik.enable=true
      - traefik.http.routers.qbittorrent.rule=Host(`qbittorrent.bajaber.ca`)
      - traefik.http.routers.qbittorrent.middlewares=securityHeaders@file
      - traefik.http.services.qbittorrent.loadbalancer.server.port=8080
    networks:
      default: null
    restart: unless-stopped
    volumes:
      - bind:
          create_host_path: true
        source: /docker/gluetun
        target: /gluetun
        type: bind
  lidarr:
    container_name: lidarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/toronto
    image: linuxserver/lidarr:latest
    labels:
      - traefik.enable=true
    networks:
      default: null
    restart: unless-stopped
    volumes:
      - bind:
          create_host_path: true
        read_only: true
        source: /etc/localtime
        target: /etc/localtime
        type: bind
      - bind:
          create_host_path: true
        source: /docker/lidarr
        target: /config
        type: bind
      - bind:
          create_host_path: true
        source: /data
        target: /data
        type: bind
  prowlarr:
    container_name: prowlarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/toronto
    image: linuxserver/prowlarr:latest
    labels:
      - traefik.enable=true
    networks:
      default: null
    # MIGRATION TEMP: revert after running scripts/migrate_arr_settings.py
    ports:
      - "9696:9696"
    restart: unless-stopped
    volumes:
      - bind:
          create_host_path: true
        read_only: true
        source: /etc/localtime
        target: /etc/localtime
        type: bind
      - bind:
          create_host_path: true
        source: /docker/prowlarr
        target: /config
        type: bind
  qbittorrent:
    container_name: qbittorrent
    depends_on:
      gluetun:
        condition: service_started
        required: true
        restart: true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/toronto
      - WEBUI_PORT=8080
    healthcheck:
      interval: 60s
      retries: 3
      start_period: 20s
      test: ping -c 1 www.google.com || exit 1
      timeout: 10s
    image: linuxserver/qbittorrent:latest
    labels:
      - deunhealth.restart.on.unhealthy= "true"
    network_mode: service:gluetun
    restart: unless-stopped
    volumes:
      - bind:
          create_host_path: true
        source: /docker/qbittorrent
        target: /config
        type: bind
      - bind:
          create_host_path: true
        source: /data
        target: /data
        type: bind
  radarr:
    container_name: radarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/toronto
    image: linuxserver/radarr:latest
    labels:
      - traefik.enable=true
    networks:
      default: null
    # MIGRATION TEMP: revert after running scripts/migrate_arr_settings.py
    ports:
      - "7878:7878"
    restart: unless-stopped
    volumes:
      - bind:
          create_host_path: true
        read_only: true
        source: /etc/localtime
        target: /etc/localtime
        type: bind
      - bind:
          create_host_path: true
        source: /docker/radarr
        target: /config
        type: bind
      - bind:
          create_host_path: true
        source: /data
        target: /data
        type: bind
  sonarr:
    container_name: sonarr
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/toronto
    image: linuxserver/sonarr:latest
    labels:
      - traefik.enable=true
    networks:
      default: null
    # MIGRATION TEMP: revert after running scripts/migrate_arr_settings.py
    ports:
      - "8989:8989"
    restart: unless-stopped
    volumes:
      - bind:
          create_host_path: true
        read_only: true
        source: /etc/localtime
        target: /etc/localtime
        type: bind
      - bind:
          create_host_path: true
        source: /docker/sonarr
        target: /config
        type: bind
      - bind:
          create_host_path: true
        source: /data
        target: /data
        type: bind
