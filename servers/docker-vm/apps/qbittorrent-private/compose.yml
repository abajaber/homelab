name: qbittorrent-private
networks:
  default:
    external: true
    name: proxy
services:
  qbittorrent:
    container_name: qbittorrent2
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/toronto
      - WEBUI_PORT=8080
    healthcheck:
      interval: 60s
      retries: 3
      start_period: 20s
      test: ping -c 1 www.google.com || exit 1
      timeout: 10s
    image: linuxserver/qbittorrent:latest
    labels:
      - traefik.enable=true
      - traefik.http.routers.qbittorrent2.rule=Host(`qbittorrent2.bajaber.ca`)
      - traefik.http.routers.qbittorrent2.middlewares=securityHeaders@file
      - traefik.http.services.qbittorrent2.loadbalancer.server.port=8080
    networks:
      default: null
    ports:
      - mode: ingress
        protocol: tcp
        published: "26614"
        target: 26614
    restart: unless-stopped
    volumes:
      - bind:
          create_host_path: true
        source: /docker/qbittorrent-priv
        target: /config
        type: bind
      - bind:
          create_host_path: true
        source: /mnt/redsea/mediarr/data/downloads-priv
        target: /data
        type: bind
