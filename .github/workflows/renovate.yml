name: Renovate
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
  issues: write
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: renovatebot/github-action@v46.1.11
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}
